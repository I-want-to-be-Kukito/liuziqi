name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            autoconf libtool pkg-config zlib1g-dev libncurses-dev \
            libffi-dev libssl-dev libltdl-dev python3-pip
          pip install --upgrade pip
          pip install cython==0.29.37
          pip install python-for-android
          pip install kivy==2.3.1

      - name: Patch android recipe for Cython build isolation
        run: |
          RECIPE=$(python -c "import pythonforandroid.recipes.android; import os; print(os.path.dirname(pythonforandroid.recipes.android.__file__))")
          echo "[build-system]" > "$RECIPE/src/pyproject.toml"
          echo 'requires = ["setuptools", "wheel", "Cython>=0.29,<3.1"]' >> "$RECIPE/src/pyproject.toml"
          echo 'build-backend = "setuptools.build_meta"' >> "$RECIPE/src/pyproject.toml"

      - name: Build APK
        run: |
          export ANDROIDSDK="$ANDROID_HOME"
          export ANDROIDNDK="$ANDROID_NDK_HOME"
          export ANDROIDAPI="34"
          export ANDROIDMINAPI="21"
          export P4A_IGNORE_HOST_PYTHON=1
          python -m pythonforandroid.toolchain apk \
            --private . \
            --package org.liuziqi \
            --name "liuziqi" \
            --version 1.0 \
            --bootstrap sdl2 \
            --requirements python3,kivy,cython \
            --arch arm64-v8a \
            --debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: liuziqi-apk
          path: ./*.apk
